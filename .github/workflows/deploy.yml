# Publica o portfolio no GitHub Pages automaticamente a cada push na branch main.
# Nao precisa rodar nada na mao: o GitHub faz o build e a publicacao.
name: Deploy no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # permite disparar manualmente pela aba Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Garante uma publicacao por vez.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
